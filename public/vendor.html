<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>بوابة البائع | أضف منتجك</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; text-align: center; }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 5px; font-size: 18px; cursor: pointer; }
        button:hover { background: #219150; }
        .note { background: #fff3cd; color: #856404; padding: 10px; border-radius: 5px; margin-bottom: 20px; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="container">
    <h2>🏪 إضافة منتج جديد</h2>
    <div class="note">
        ⚠️ تنبيه: سيتم مراجعة منتجك من قبل الإدارة قبل نشره في السوق لضمان الجودة.
    </div>

    <form id="vendorForm">
        <label>اسم المتجر / البائع</label>
        <input type="text" id="vendorName" required placeholder="مثال: متجر الأمل للإلكترونيات">

        <label>اسم المنتج</label>
        <input type="text" id="productTitle" required placeholder="مثال: آيفون 13 برو ماكس">

        <label>السعر (دينار ليبي)</label>
        <input type="number" id="productPrice" required placeholder="5000">

        <label>المدينة المتوفر فيها المنتج</label>
        <select id="productCity">
            <option value="طرابلس">طرابلس</option>
            <option value="بنغازي">بنغازي</option>
            <option value="مصراتة">مصراتة</option>
            <option value="الزاوية">الزاوية</option>
        </select>

        <label>رابط صورة المنتج (اختياري)</label>
        <input type="url" id="imageUrl" placeholder="https://example.com/image.jpg">

        <button type="submit">إرسال للمراجعة ✅</button>
    </form>
</div>

<script>
    document.getElementById('vendorForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const data = {
            vendor_name: document.getElementById('vendorName').value,
            title: document.getElementById('productTitle').value,
            price: document.getElementById('productPrice').value,
            city: document.getElementById('productCity').value,
            image_url: document.getElementById('imageUrl').value
        };

        try {
            const response = await fetch('/api/product', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            
            const result = await response.json();
            alert(result.message);
            document.getElementById('vendorForm').reset();
        } catch (error) {
            alert('حدث خطأ في الإرسال');
        }
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>خدمات ليبيا | اطلب خدمة الآن</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #e74c3c; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; }
        .success { display: none; background: #d4edda; color: #155724; padding: 15px; border-radius: 8px; margin-top: 20px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>🛠️ اطلب خدمة منزلية</h1>
    <p style="text-align:center; color:#666;">سباكة، كهرباء، توصيل.. نصلك أينما كنت</p>
    
    <form id="serviceForm">
        <div class="form-group">
            <label>الاسم</label>
            <input type="text" id="name" required>
        </div>
        <div class="form-group">
            <label>رقم الهاتف</label>
            <input type="tel" id="phone" required>
        </div>
        <div class="form-group">
            <label>الموقع / العنوان</label>
            <input type="text" id="location" required placeholder="طرابلس، حي الأندلس...">
        </div>
        <div class="form-group">
            <label>نوع الخدمة</label>
            <select id="serviceType">
                <option value="سباكة">سباكة</option>
                <option value="كهرباء">كهرباء</option>
                <option value="توصيل">توصيل طلبات</option>
                <option value="تنظيف">تنظيف</option>
            </select>
        </div>
        <div class="form-group">
            <label>تفاصيل المشكلة</label>
            <textarea id="details" rows="3" placeholder="وصف مختصر للمشكلة..."></textarea>
        </div>
        <button type="submit">إرسال الطلب 🚀</button>
    </form>

    <div id="successMsg" class="success">
        ✅ تم استلام طلبك! <br> ستقوم الإدارة بتعيين أقرب مقدم خدمة لك.
    </div>
</div>

<script>
    document.getElementById('serviceForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const data = {
            customer_name: document.getElementById('name').value,
            customer_phone: document.getElementById('phone').value,
            location: document.getElementById('location').value,
            service_type: document.getElementById('serviceType').value,
            details: document.getElementById('details').value
        };

        await fetch('/api/request', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        
        document.getElementById('serviceForm').style.display = 'none';
        document.getElementById('successMsg').style.display = 'block';
    });
</script>
</body>
</html>
